<!doctype html>
<html lang="$lang$">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>$title$</title>
<style>
:root{
  --bg:#fbf8f2; --bg2:#f3eee3; --fg:#23201a; --fg2:#544c3e; --mut:#8a8071;
  --acc:#a8682a; --acc2:#c98a3e; --line:#e7ded0; --key:#fef6e6; --keyline:#e9c987;
  --sheet:#fffdf8; --shadow:0 8px 30px rgba(60,40,10,.16);
  --maxw:42rem;
}
@media (prefers-color-scheme:dark){:root{
  --bg:#15130f; --bg2:#1d1a14; --fg:#ece5d8; --fg2:#b6ac99; --mut:#8c8473;
  --acc:#e0a85a; --acc2:#f0bd74; --line:#2e281f; --key:#221c11; --keyline:#5a4827;
  --sheet:#1c1812; --shadow:0 10px 34px rgba(0,0,0,.5);
}}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  margin:0;background:var(--bg);color:var(--fg);
  font:400 17.5px/1.78 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Noto Sans SC","Microsoft YaHei",Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  overflow-wrap:break-word;word-break:normal;
}
:lang(zh) body, body:lang(zh){line-height:1.92;letter-spacing:.01em}

/* ---------- progress + header ---------- */
.progress{position:fixed;top:0;left:0;height:3px;width:0;z-index:60;
  background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .08s linear}
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:.5rem;
  padding:max(.55rem,env(safe-area-inset-top)) .9rem .55rem;
  background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:saturate(1.4) blur(10px);
  border-bottom:1px solid var(--line)}
.menu-btn{appearance:none;border:1px solid var(--line);background:var(--bg2);color:var(--fg);
  width:40px;height:40px;border-radius:11px;font-size:1.15rem;line-height:1;cursor:pointer;
  display:grid;place-items:center;flex:0 0 auto}
.menu-btn:active{transform:scale(.94)}
.brand{flex:1 1 auto;font-weight:700;font-size:.98rem;letter-spacing:.02em;color:var(--fg);
  text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand small{color:var(--mut);font-weight:500}
.langs{display:flex;gap:.15rem;flex:0 0 auto;background:var(--bg2);border:1px solid var(--line);
  border-radius:11px;padding:3px}
.langs a{font-size:.8rem;font-weight:600;color:var(--fg2);text-decoration:none;
  padding:.28rem .5rem;border-radius:8px;line-height:1}
.langs a.on{background:var(--acc);color:#fff}

/* ---------- drawer (TOC) ---------- */
.scrim{position:fixed;inset:0;background:rgba(20,12,0,.42);opacity:0;visibility:hidden;
  transition:opacity .25s;z-index:55}
.scrim.show{opacity:1;visibility:visible}
.drawer{position:fixed;top:0;left:0;bottom:0;width:min(82vw,20rem);z-index:56;
  background:var(--sheet);border-right:1px solid var(--line);box-shadow:var(--shadow);
  transform:translateX(-102%);transition:transform .28s cubic-bezier(.22,.61,.36,1);
  overflow-y:auto;padding:1rem 0 2rem;overscroll-behavior:contain}
.drawer.show{transform:none}
.drawer h2{margin:.2rem 1.1rem .6rem;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--mut);font-weight:700;border:0;padding:0}
#TOC ul{list-style:none;margin:0;padding:0}
#TOC li{margin:0}
#TOC a{display:block;padding:.6rem 1.1rem;color:var(--fg2);text-decoration:none;font-size:.94rem;
  line-height:1.35;border-left:3px solid transparent}
#TOC a:active{background:var(--bg2)}
#TOC a.active{color:var(--acc);border-left-color:var(--acc);background:var(--key);font-weight:600}

/* ---------- main / typography ---------- */
main{max-width:var(--maxw);margin:0 auto;padding:1.4rem 1.15rem 5rem}
main>h1:first-child{font-size:1.7rem;line-height:1.25;letter-spacing:-.015em;margin:.6rem 0 .4rem;font-weight:800}
h2{font-size:1.32rem;line-height:1.3;font-weight:750;letter-spacing:-.01em;
  margin:2.9rem 0 .7rem;padding-top:1.6rem;border-top:1px solid var(--line);scroll-margin-top:64px}
h3{font-size:1.06rem;font-weight:700;color:var(--acc);margin:1.7rem 0 .35rem;letter-spacing:.005em;scroll-margin-top:64px}
p{margin:.78rem 0}
a{color:var(--acc);text-decoration:underline;text-decoration-thickness:.5px;text-underline-offset:2px}
strong{font-weight:680;color:var(--fg)}
em{font-style:italic;color:var(--fg2)}
hr{border:0;border-top:1px solid var(--line);margin:2.4rem 0}
ul,ol{padding-left:1.25rem;margin:.7rem 0}
li{margin:.34rem 0}
blockquote{margin:1.1rem 0;padding:.5rem 0 .5rem 1.05rem;border-left:3px solid var(--acc2);
  color:var(--fg2);font-style:italic}
code{background:var(--bg2);padding:.1em .38em;border-radius:6px;font-size:.9em;
  font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace}

/* ---------- KEY callout: first paragraph after each chapter h2 ---------- */
h2 + p{position:relative;margin:1rem 0 1.3rem;padding:1rem 1.05rem 1rem 1.05rem;
  background:var(--key);border:1px solid var(--keyline);border-radius:14px;
  font-size:1.02rem;line-height:1.7}
h2 + p::before{content:"🔑";position:absolute;top:-.72rem;left:.85rem;background:var(--bg);
  padding:0 .35rem;font-size:.95rem}
h2 + p strong:first-child{color:var(--acc);font-weight:720}

/* intro "keys up front" list (after the first hr in front matter) */
main>ul li strong{color:var(--acc)}

/* ---------- footnotes ---------- */
.footnote-ref{text-decoration:none;font-weight:700;color:var(--acc);
  font-size:.72em;padding:0 .12em;vertical-align:super;line-height:0}
.footnote-ref:hover{color:var(--acc2)}
section.footnotes,.footnotes{margin-top:3.4rem;padding-top:1.2rem;border-top:2px solid var(--line);
  font-size:.84rem;line-height:1.6;color:var(--fg2)}
.footnotes h2{font-size:1rem;border:0;padding:0;margin:0 0 .6rem}
.footnotes ol{padding-left:1.3rem}
.footnotes li{margin:.45rem 0;overflow-wrap:anywhere}
.footnotes a{color:var(--mut)}

/* ---------- footnote bottom-sheet ---------- */
#fnsheet{position:fixed;left:0;right:0;bottom:0;z-index:70;transform:translateY(110%);
  transition:transform .26s cubic-bezier(.22,.61,.36,1);
  background:var(--sheet);border-top:1px solid var(--line);
  border-radius:18px 18px 0 0;box-shadow:var(--shadow);
  padding:1.1rem 1.2rem calc(1.4rem + env(safe-area-inset-bottom));
  max-height:60vh;overflow-y:auto}
#fnsheet.show{transform:none}
#fnsheet .grip{width:44px;height:5px;border-radius:99px;background:var(--line);margin:-.3rem auto .7rem;cursor:pointer}
#fnsheet .fnhead{display:flex;align-items:center;justify-content:space-between;gap:.6rem;margin-bottom:.5rem}
#fnsheet .lbl{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);font-weight:700}
.fnclose{appearance:none;border:1px solid var(--line);background:var(--bg2);color:var(--fg);
  width:36px;height:36px;border-radius:10px;font-size:1.05rem;line-height:1;cursor:pointer;
  display:grid;place-items:center;flex:0 0 auto}
.fnclose:active{transform:scale(.92)}
#fnsheet .body{font-size:.92rem;line-height:1.6;color:var(--fg)}
#fnsheet .body a{color:var(--acc);word-break:break-all}

/* ---------- back to top ---------- */
.totop{position:fixed;right:1rem;bottom:calc(1rem + env(safe-area-inset-bottom));z-index:40;
  width:46px;height:46px;border-radius:50%;border:1px solid var(--line);background:var(--sheet);
  color:var(--acc);font-size:1.25rem;cursor:pointer;box-shadow:var(--shadow);
  opacity:0;visibility:hidden;transition:opacity .2s,transform .2s;display:grid;place-items:center}
.totop.show{opacity:1;visibility:visible}
.totop:active{transform:scale(.9)}

/* ---------- desktop ---------- */
@media (min-width:1040px){
  body{font-size:18.5px}
  .menu-btn{display:none}
  main{margin-left:20rem;max-width:44rem}
  main>h1:first-child{font-size:2.1rem}
  h2{font-size:1.5rem}
  .drawer{transform:none;box-shadow:none;width:19rem;border-right:1px solid var(--line);
    background:var(--bg)}
  .drawer h2{margin-top:.6rem}
  .scrim{display:none}
  .topbar{padding-left:20.9rem}
}
@media (min-width:1040px) and (prefers-color-scheme:dark){.drawer{background:var(--bg)}}
</style>
</head>
<body>
<div class="progress" id="progress"></div>

<header class="topbar">
  <button class="menu-btn" id="menuBtn" aria-label="目录 / Contents">☰</button>
  <a class="brand" href="index.html">钥匙 · KEYS <small>· Ключи</small></a>
  <nav class="langs" id="langs">
    <a href="zh.html" data-l="zh">中文</a>
    <a href="en.html" data-l="en">EN</a>
    <a href="ru.html" data-l="ru">RU</a>
  </nav>
</header>

$if(toc)$
<aside class="drawer" id="drawer">
  <h2>目录 · Contents</h2>
  <nav id="TOC">$toc$</nav>
</aside>
$endif$
<div class="scrim" id="scrim"></div>

<main>
$body$
</main>

<button class="totop" id="toTop" aria-label="Back to top">↑</button>

<div id="fnsheet" role="dialog" aria-label="reference" aria-modal="true">
  <div class="grip" id="fngrip"></div>
  <div class="fnhead">
    <div class="lbl" id="fnlbl">Reference</div>
    <button class="fnclose" id="fnClose" aria-label="Close">✕</button>
  </div>
  <div class="body" id="fnbody"></div>
</div>

<script>
(function(){
  var drawer=document.getElementById('drawer'),scrim=document.getElementById('scrim'),
      menuBtn=document.getElementById('menuBtn'),toTop=document.getElementById('toTop'),
      progress=document.getElementById('progress'),sheet=document.getElementById('fnsheet'),
      fnbody=document.getElementById('fnbody'),fnlbl=document.getElementById('fnlbl'),
      fnClose=document.getElementById('fnClose'),fngrip=document.getElementById('fngrip');
  function openD(){if(drawer){drawer.classList.add('show');scrim.classList.add('show');}}
  function closeD(){if(drawer){drawer.classList.remove('show');scrim.classList.remove('show');}}
  if(menuBtn)menuBtn.onclick=openD; if(scrim)scrim.onclick=function(){closeD();closeSheet();};

  // mark active language tab
  var page=(location.pathname.split('/').pop()||'zh.html').replace('.html','')||'zh';
  document.querySelectorAll('#langs a').forEach(function(a){if(a.dataset.l===page)a.classList.add('on');});

  // TOC: close drawer on click (mobile)
  if(drawer)drawer.addEventListener('click',function(e){if(e.target.tagName==='A'&&window.innerWidth<1040)closeD();});

  // scroll progress + back-to-top + active toc
  var heads=[].slice.call(document.querySelectorAll('main h2'));
  var tocLinks=[].slice.call(document.querySelectorAll('#TOC a'));
  function onScroll(){
    var h=document.documentElement,st=h.scrollTop||document.body.scrollTop,
        sh=(h.scrollHeight-h.clientHeight)||1;
    progress.style.width=(st/sh*100)+'%';
    toTop.classList.toggle('show',st>600);
    // active section
    var cur=null;
    for(var i=0;i<heads.length;i++){if(heads[i].getBoundingClientRect().top<120)cur=heads[i];}
    if(cur){var id=cur.id;tocLinks.forEach(function(a){
      a.classList.toggle('active',a.getAttribute('href')==='#'+id);});}
  }
  document.addEventListener('scroll',onScroll,{passive:true});onScroll();
  toTop.onclick=function(){window.scrollTo({top:0,behavior:'smooth'});};

  // footnote bottom-sheet
  function openSheet(){sheet.classList.add('show');if(scrim)scrim.classList.add('show');}
  function closeSheet(){sheet.classList.remove('show');
    if(scrim&&(!drawer||!drawer.classList.contains('show')))scrim.classList.remove('show');}
  document.querySelectorAll('a.footnote-ref').forEach(function(a){
    a.addEventListener('click',function(e){
      var id=a.getAttribute('href');if(!id||id[0]!=='#')return;
      var li=document.querySelector(id);if(!li)return;
      e.preventDefault();e.stopPropagation();
      fnbody.innerHTML=li.innerHTML.replace(/<a[^>]*class="footnote-back"[^>]*>[\s\S]*?<\/a>/g,'');
      if(fnlbl)fnlbl.textContent='Reference · '+id.replace('#fn','');
      openSheet();
    });
  });
  if(fnClose)fnClose.onclick=closeSheet;
  if(fngrip)fngrip.onclick=closeSheet;
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeSheet();});
  // outside-click closes (desktop, where scrim is hidden; opening tap is stopPropagation'd)
  document.addEventListener('click',function(e){
    if(!sheet.classList.contains('show'))return;
    if(sheet.contains(e.target))return;
    if(e.target.closest&&e.target.closest('a.footnote-ref'))return;
    closeSheet();
  });
  // swipe-down to close sheet
  var sy=0;sheet.addEventListener('touchstart',function(e){sy=e.touches[0].clientY;},{passive:true});
  sheet.addEventListener('touchmove',function(e){if(e.touches[0].clientY-sy>60)closeSheet();},{passive:true});
})();
</script>
</body>
</html>
